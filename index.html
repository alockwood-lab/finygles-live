<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Finaygle's Live</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1C1210;--card:#2A1E19;--card2:#362820;--border:#4A3828;
  --orange:#E8763A;--bright:#FF8F4F;--glow:rgba(232,118,58,.15);--dim:#B8613A;
  --cream:#F5E6D8;--muted:#9C8474;--white:#FFF5EE;
  --green:#6BCB77;--red:#FF6B6B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--cream);-webkit-font-smoothing:antialiased;}

.header{background:linear-gradient(180deg,#3D2218 0%,var(--bg) 100%);padding:28px 20px 12px;text-align:center;}
.header h1{font-size:28px;font-weight:900;color:var(--bright);letter-spacing:-1px;}
.header .sub{font-size:13px;color:var(--muted);margin-top:4px;}

.page{max-width:480px;margin:0 auto;padding:0 16px 40px;}

.big-stat{text-align:center;padding:20px 16px 8px;}
.big-stat .number{font-size:52px;font-weight:900;color:var(--bright);line-height:1;letter-spacing:-2px;}
.big-stat .label{font-size:13px;color:var(--muted);margin-top:6px;}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
.stat-card .val{font-size:22px;font-weight:800;color:var(--white);}
.stat-card .val.up{color:var(--green);}
.stat-card .val.fire{color:var(--bright);}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}

.section{margin-top:24px;margin-bottom:10px;}
.section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding-left:4px;}

.chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.chart-card h3{font-size:15px;font-weight:700;color:var(--white);margin-bottom:2px;}
.chart-card .csub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.chart-wrap{position:relative;height:220px;}

.cal{margin-bottom:12px;}
.cal-month{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;}
.cal-month h4{font-size:14px;font-weight:700;color:var(--white);margin-bottom:10px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-head{font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-day{font-size:12px;padding:8px 2px;border-radius:8px;font-weight:600;color:var(--muted);}
.cal-day.live{background:var(--orange);color:#fff;}
.cal-day.proj{background:rgba(255,143,79,.2);color:var(--bright);border:1px dashed var(--bright);}
.cal-day.empty{color:transparent;}
.cal-day.today{box-shadow:0 0 0 2px var(--white);}

.insight{background:linear-gradient(135deg,#3D2218,#4A2E1E);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;text-align:center;}
.insight .itxt{font-size:14px;color:var(--cream);line-height:1.6;}
.insight .itxt strong{color:var(--bright);}
.insight .emoji{font-size:28px;margin-bottom:6px;}

.footer{text-align:center;padding:20px 16px;font-size:11px;color:#4A3828;margin-top:16px;}
</style>
</head>
<body>

<div class="header">
  <h1>Finaygle's Live</h1>
  <div class="sub">TikTok LIVE &middot; May 26 – Jun 24</div>
</div>

<div class="page">

<div class="big-stat">
  <div class="number" id="totalLikes"></div>
  <div class="label">total likes across all streams</div>
</div>

<div class="stat-row" id="stats"></div>
<div class="stat-row" id="stats2"></div>

<div class="insight" id="streakBox"></div>

<div class="section"><div class="section-label">Time Spent Live vs Likes</div></div>
<div class="chart-card">
  <h3>Hours Live &amp; Likes by Week</h3>
  <div class="csub">More time live = more likes. The bars show hours, the line shows likes.</div>
  <div class="chart-wrap" style="height:240px;"><canvas id="weeklyChart"></canvas></div>
</div>

<div class="section"><div class="section-label">When to Catch the Next Stream</div></div>
<div class="cal" id="calendar"></div>

<div class="insight" id="nextLive"></div>

</div>

<div class="footer">Finaygle's Live &middot; Stream Dashboard</div>

<script>
const STREAMS = [
  {date:'May 26',start:'1:27 PM',end:'4:50 PM',likes:594},
  {date:'May 26',start:'5:03 PM',end:'8:46 PM',likes:20500},
  {date:'May 26',start:'8:48 PM',end:'11:25 PM',likes:2932},
  {date:'May 27',start:'1:11 AM',end:'1:11 AM',likes:0},
  {date:'May 27',start:'1:17 AM',end:'1:58 AM',likes:253},
  {date:'May 27',start:'1:59 AM',end:'5:38 AM',likes:12500},
  {date:'May 27',start:'5:40 AM',end:'12:48 PM',likes:51400},
  {date:'May 27',start:'12:52 PM',end:'1:58 PM',likes:952},
  {date:'May 27',start:'9:20 PM',end:'7:14 AM',likes:50100},
  {date:'May 28',start:'8:23 PM',end:'10:28 PM',likes:2922},
  {date:'May 28',start:'10:29 PM',end:'10:31 PM',likes:0},
  {date:'May 31',start:'11:22 PM',end:'5:28 AM',likes:5843},
  {date:'Jun 1',start:'7:52 PM',end:'7:04 AM',likes:14200},
  {date:'Jun 2',start:'8:21 PM',end:'6:00 AM',likes:14100},
  {date:'Jun 3',start:'7:22 PM',end:'7:23 PM',likes:0},
  {date:'Jun 3',start:'7:24 PM',end:'11:49 PM',likes:23600},
  {date:'Jun 4',start:'12:10 AM',end:'12:06 PM',likes:43800},
  {date:'Jun 4',start:'9:01 PM',end:'3:10 AM',likes:21500},
  {date:'Jun 5',start:'7:45 PM',end:'11:45 PM',likes:4612},
  {date:'Jun 5',start:'11:45 PM',end:'8:41 AM',likes:32500},
  {date:'Jun 6',start:'8:13 PM',end:'6:26 AM',likes:31900},
  {date:'Jun 7',start:'7:18 PM',end:'6:37 AM',likes:33900},
  {date:'Jun 8',start:'6:40 AM',end:'11:39 AM',likes:11500},
  {date:'Jun 8',start:'8:46 PM',end:'5:41 AM',likes:9285},
  {date:'Jun 9',start:'8:04 PM',end:'10:26 AM',likes:16500},
  {date:'Jun 11',start:'9:08 PM',end:'5:13 AM',likes:26800},
  {date:'Jun 14',start:'10:28 PM',end:'3:34 AM',likes:20500},
  {date:'Jun 15',start:'11:22 PM',end:'3:51 AM',likes:10300},
  {date:'Jun 17',start:'9:52 PM',end:'4:43 PM',likes:53400},
  {date:'Jun 18',start:'8:55 PM',end:'5:03 AM',likes:12700},
  {date:'Jun 20',start:'12:13 AM',end:'4:00 AM',likes:37400},
  {date:'Jun 23',start:'6:56 PM',end:'11:39 PM',likes:18200},
  {date:'Jun 23',start:'11:45 PM',end:'4:39 AM',likes:32600},
  {date:'Jun 24',start:'9:54 PM',end:'6:02 AM',likes:13600},
];

function parseTime(t){const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 0;let h=+m[1],min=+m[2];if(m[3].toUpperCase()==='PM'&&h!==12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;return h*60+min;}
function durMins(s,e){let sm=parseTime(s),em=parseTime(e);if(em<=sm)em+=24*60;return em-sm;}
function fk(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toLocaleString();}
function toDate(ds){const p=ds.split(' ');return new Date(2025,p[0]==='May'?4:5,+p[1]);}

// Totals
const totalLikes=STREAMS.reduce((s,d)=>s+d.likes,0);
const totalMins=STREAMS.reduce((s,d)=>s+durMins(d.start,d.end),0);
const totalHrs=(totalMins/60).toFixed(0);
document.getElementById('totalLikes').textContent=fk(totalLikes);

// Best time analysis
const brackets=[
  {name:'Evening',range:'7 PM – 11 PM',min:19*60,max:23*60,likes:0,count:0},
  {name:'Late Night',range:'11 PM – 3 AM',min:23*60,max:27*60,likes:0,count:0},
  {name:'Overnight',range:'3 AM – 9 AM',min:3*60,max:9*60,likes:0,count:0},
  {name:'Daytime',range:'9 AM – 7 PM',min:9*60,max:19*60,likes:0,count:0},
];
STREAMS.filter(s=>s.likes>0).forEach(s=>{
  const t=parseTime(s.start);
  brackets.forEach(b=>{
    const lo=b.min%1440, hi=b.max%1440;
    if(b.max>1440){if(t>=lo||t<hi){b.likes+=s.likes;b.count++;}}
    else{if(t>=lo&&t<hi){b.likes+=s.likes;b.count++;}}
  });
});
const bestBracket=brackets.filter(b=>b.count>0).sort((a,b)=>(b.likes/b.count)-(a.likes/a.count))[0];

// Longest streak
const streamDates=[...new Set(STREAMS.map(s=>s.date))].map(toDate).sort((a,b)=>a-b);
let maxStreak=1,curStreak=1,streakStart=streamDates[0],streakEnd=streamDates[0],bestStreakStart=streamDates[0],bestStreakEnd=streamDates[0];
for(let i=1;i<streamDates.length;i++){
  const diff=(streamDates[i]-streamDates[i-1])/(24*60*60*1000);
  if(diff===1){curStreak++;streakEnd=streamDates[i];if(curStreak>maxStreak){maxStreak=curStreak;bestStreakStart=streakStart;bestStreakEnd=streakEnd;}}
  else{curStreak=1;streakStart=streamDates[i];streakEnd=streamDates[i];}
}
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'];
const streakStartStr=months[bestStreakStart.getMonth()]+' '+bestStreakStart.getDate();
const streakEndStr=months[bestStreakEnd.getMonth()]+' '+bestStreakEnd.getDate();

// Stats
const realStreams=STREAMS.filter(s=>s.likes>0);
const avgPerStream=Math.round(totalLikes/realStreams.length);
const mayLikes=STREAMS.filter(s=>s.date.startsWith('May')).reduce((a,b)=>a+b.likes,0);
const junLikes=STREAMS.filter(s=>s.date.startsWith('Jun')).reduce((a,b)=>a+b.likes,0);
const momGrowth=mayLikes>0?((junLikes-mayLikes)/mayLikes):0;

document.getElementById('stats').innerHTML=`
  <div class="stat-card"><div class="val">${totalHrs}h</div><div class="lbl">total hours live</div></div>
  <div class="stat-card"><div class="val">${fk(avgPerStream)}</div><div class="lbl">avg likes per stream</div></div>
`;
document.getElementById('stats2').innerHTML=`
  <div class="stat-card"><div class="val up">+${Math.round(momGrowth*100)}%</div><div class="lbl">June vs May growth</div></div>
  <div class="stat-card"><div class="val fire">${bestBracket.name}</div><div class="lbl">best time to go live<br>${bestBracket.range}</div></div>
`;

document.getElementById('streakBox').innerHTML=`
  <div class="emoji">&#128293;&#128293;&#128293;</div>
  <div class="itxt"><strong>${maxStreak}-day streak!</strong><br>${streakStartStr} – ${streakEndStr}<br>That's ${maxStreak} days in a row going live</div>
`;

// Weekly data: hours + likes
function weekOf(ds){const dt=toDate(ds);const start=new Date(2025,4,26);return Math.floor((dt-start)/(7*24*60*60*1000));}
const weekHrs={},weekLikes={};
STREAMS.forEach(s=>{
  const w=weekOf(s.date);
  weekHrs[w]=(weekHrs[w]||0)+durMins(s.start,s.end)/60;
  weekLikes[w]=(weekLikes[w]||0)+s.likes;
});
const wks=Object.keys(weekHrs).map(Number).sort((a,b)=>a-b);
const wkLabels=wks.map((_,i)=>'Wk '+(i+1));
const wkHrsData=wks.map(w=>+weekHrs[w].toFixed(1));
const wkLikesData=wks.map(w=>weekLikes[w]);

Chart.defaults.color='#9C8474';
Chart.defaults.borderColor='#362820';
const touchOpts={interaction:{mode:'nearest',intersect:false},events:['mousemove','mouseout','click','touchstart','touchmove']};

new Chart(document.getElementById('weeklyChart'),{
  type:'bar',
  data:{labels:wkLabels,datasets:[
    {label:'Hours Live',data:wkHrsData,backgroundColor:'rgba(232,118,58,.6)',borderRadius:6,borderSkipped:false,yAxisID:'y',order:2},
    {label:'Likes',data:wkLikesData,type:'line',borderColor:'#FF8F4F',backgroundColor:'rgba(255,143,79,.1)',pointBackgroundColor:'#FF8F4F',pointRadius:5,pointHoverRadius:8,borderWidth:3,tension:.3,fill:true,yAxisID:'y1',order:1},
  ]},
  options:{...touchOpts,responsive:true,maintainAspectRatio:false,plugins:{
    legend:{display:true,position:'bottom',labels:{boxWidth:10,padding:12,font:{size:11,family:'Inter'},color:'#9C8474'}},
    tooltip:{callbacks:{label:ctx=>ctx.dataset.label==='Likes'?fk(ctx.raw)+' likes':ctx.raw+'h live'}}},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:12,weight:'bold',family:'Inter'}}},
      y:{position:'left',title:{display:true,text:'Hours',font:{size:10},color:'#9C8474'},ticks:{font:{size:10},color:'#B8613A'},grid:{color:'rgba(74,56,40,.3)'}},
      y1:{position:'right',title:{display:true,text:'Likes',font:{size:10},color:'#9C8474'},ticks:{callback:v=>fk(v),font:{size:10},color:'#FF8F4F'},grid:{display:false}}
    }}
});

// Calendar
const liveDates=new Set(STREAMS.map(s=>{const p=s.date.split(' ');return(p[0]==='May'?4:5)+'-'+p[1];}));

// Predict next streams: avg gap between stream days
const sortedDates=[...new Set(STREAMS.map(s=>s.date))].map(toDate).sort((a,b)=>a-b);
const gaps=[];
for(let i=1;i<sortedDates.length;i++)gaps.push((sortedDates[i]-sortedDates[i-1])/(24*60*60*1000));
const avgGap=gaps.reduce((a,b)=>a+b,0)/gaps.length;
const projDates=new Set();
let last=sortedDates[sortedDates.length-1];
for(let i=0;i<15;i++){
  last=new Date(last.getTime()+Math.round(avgGap)*24*60*60*1000);
  if(last.getMonth()<=7)projDates.add(last.getMonth()+'-'+last.getDate());
}

function buildCal(month,year,label){
  const first=new Date(year,month,1);
  const daysInMonth=new Date(year,month+1,0).getDate();
  const startDay=first.getDay();
  let html=`<div class="cal-month"><h4>${label}</h4><div class="cal-grid">`;
  ['S','M','T','W','T','F','S'].forEach(d=>{html+=`<div class="cal-head">${d}</div>`;});
  for(let i=0;i<startDay;i++)html+=`<div class="cal-day empty">.</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=month+'-'+d;
    const isLive=liveDates.has(key);
    const isProj=!isLive&&projDates.has(key);
    const cls=isLive?'live':isProj?'proj':'';
    html+=`<div class="cal-day ${cls}">${d}</div>`;
  }
  html+=`</div></div>`;
  return html;
}

document.getElementById('calendar').innerHTML=
  buildCal(5,2025,'June (actual streams in orange)')+
  buildCal(6,2025,'July (projected streams dashed)');

// Next live prediction
const dayOfWeek=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const projArr=[...projDates].map(k=>{const p=k.split('-');return new Date(2025,+p[0],+p[1]);}).sort((a,b)=>a-b);
const nextDate=projArr[0];
const nextDay=dayOfWeek[nextDate.getDay()];
const nextStr=months[nextDate.getMonth()]+' '+nextDate.getDate();

document.getElementById('nextLive').innerHTML=`
  <div class="emoji">&#128308;</div>
  <div class="itxt">Based on the pattern, expect Finaygle live next around<br><strong>${nextDay}, ${nextStr}</strong><br>Usually starts <strong>${bestBracket.range}</strong></div>
`;
</script>
</body>
</html>
